<!-- CSS for using these icons -->
<style>
  .icon {
    display: inline-block;
    width: 1em;
    height: 1em;
    vertical-align: -0.125em;
    color: currentColor;
  }

  .icon-education { /* use: <svg class="icon icon-education">...</svg> */ }
  .icon-tech { /* use: <svg class="icon icon-tech">...</svg> */ }
  .icon-arts { /* use: <svg class="icon icon-arts">...</svg> */ }
