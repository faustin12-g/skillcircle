  .icon-language { /* use: <svg class="icon icon-language">...</svg> */ }
  .icon-business { /* use: <svg class="icon icon-business">...</svg> */ }
</style>

<!-- How to Replace Emojis with SVG Icons:

1. Find emoji references in HTML (e.g., "💻 Tech")
2. Replace with: <svg class="icon icon-tech"></svg> Tech

3. Or use this approach for inline styling:
   <span style="display: inline-flex; align-items: center; gap: 6px;">
     <svg class="icon icon-tech"></svg>
     <span>Tech</span>
   </span>

4. For better performance, optimize SVGs:
   - Remove unnecessary attributes
   - Use stroke instead of fill where possible
   - Keep viewBox="0 0 24 24" consistent

5. To change icon colors, update the svg fill or stroke:
   stroke="currentColor" (inherits text color)
   fill="currentColor" (inherits text color)
   fill="#c84b2f" (specific color)

Note: Current implementation uses emoji for universal browser support and
easy customization. SVG icons are available for future enhancement.
-->
